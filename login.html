<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - FXcrypt</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      .auth-container {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .auth-form {
        background-color: #1a1a1a;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        width: 100%;
        max-width: 500px;
        max-height: 85vh;
        overflow-y: auto;
      }

      .auth-form h2 {
        text-align: center;
        margin-bottom: 30px;
        color: #ffffff;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
      }

      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid #333;
        border-radius: 5px;
        background-color: #2a2a2a;
        color: #ffffff;
        font-size: 16px;
        box-sizing: border-box;
      }

      .form-group input:focus {
        outline: none;
        border-color: #00c853;
      }

      .submit-btn {
        width: 100%;
        padding: 12px;
        background-color: #00c853;
        color: #000;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      .submit-btn:hover {
        background-color: #00b847;
      }

      .toggle-form {
        text-align: center;
        margin-top: 20px;
        color: #aaa;
      }

      .toggle-form a {
        color: #00c853;
        text-decoration: none;
        cursor: pointer;
      }

      .toggle-form a:hover {
        text-decoration: underline;
      }

      .error-message {
        color: #ff1744;
        font-size: 14px;
        margin-top: 10px;
        display: none;
      }

      .success-message {
        color: #00c853;
        font-size: 14px;
        margin-top: 10px;
        display: none;
      }

      #signupForm {
        display: none;
      }

      .logo {
        text-align: center;
        margin-bottom: 30px;
      }

      .logo img {
        width: 150px;
        height: auto;
      }
    </style>
  </head>
  <body
    style="
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #0d0d0d;
      margin: 0;
      padding: 20px;
    "
  >
    <div class="auth-form">
      <div class="logo">
        <img src="logo.svg" alt="FXcrypt Logo" />
      </div>

      <!-- Login Form -->
      <form id="loginForm">
        <h2>Login</h2>
        <div class="form-group">
          <label for="loginEmail">Email:</label>
          <input type="email" id="loginEmail" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password:</label>
          <input type="password" id="loginPassword" required />
        </div>
        <button type="submit" class="submit-btn">Login</button>
        <div class="error-message" id="loginError"></div>
        <div class="toggle-form">
          Don't have an account? <a onclick="toggleForms()">Sign Up</a>
        </div>
      </form>

      <!-- Signup Form -->
      <form id="signupForm">
        <h2>Sign Up</h2>
        <div class="form-group">
          <label for="firstName">First Name:</label>
          <input type="text" id="firstName" required />
        </div>
        <div class="form-group">
          <label for="lastName">Last Name:</label>
          <input type="text" id="lastName" required />
        </div>
        <div class="form-group">
          <label for="signupEmail">Email:</label>
          <input type="email" id="signupEmail" required />
        </div>
        <div class="form-group">
          <label for="phone">Phone:</label>
          <input type="tel" id="phone" required />
        </div>
        <div class="form-group">
          <label for="signupPassword">Password:</label>
          <input type="password" id="signupPassword" required />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password:</label>
          <input type="password" id="confirmPassword" required />
        </div>
        <button type="submit" class="submit-btn">Sign Up</button>
        <div class="error-message" id="signupError"></div>
        <div class="success-message" id="signupSuccess"></div>
        <div class="toggle-form">
          Already have an account? <a onclick="toggleForms()">Login</a>
        </div>
      </form>
    </div>

    <script>
      let isLoginFormVisible = true;

      function toggleForms() {
        const loginForm = document.getElementById("loginForm");
        const signupForm = document.getElementById("signupForm");

        isLoginFormVisible = !isLoginFormVisible;

        if (isLoginFormVisible) {
          loginForm.style.display = "block";
          signupForm.style.display = "none";
        } else {
          loginForm.style.display = "none";
          signupForm.style.display = "block";
        }

        document.getElementById("loginError").style.display = "none";
        document.getElementById("signupError").style.display = "none";
        document.getElementById("signupSuccess").style.display = "none";
      }

      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const email = document.getElementById("loginEmail").value;
          const password = document.getElementById("loginPassword").value;
          const errorDiv = document.getElementById("loginError");

          if (!email || !password) {
            errorDiv.textContent = "Please fill in all fields";
            errorDiv.style.display = "block";
            return;
          }

          const users = JSON.parse(localStorage.getItem("users") || "[]");
          const user = users.find(
            (u) => u.email === email && u.password === password,
          );

          if (user) {
            localStorage.setItem(
              "currentUser",
              JSON.stringify({
                firstName: user.firstName,
                lastName: user.lastName,
                email: user.email,
                phone: user.phone,
              }),
            );
            window.location.href = "index.html";
          } else {
            errorDiv.textContent = "Invalid email or password";
            errorDiv.style.display = "block";
          }
        });

      document
        .getElementById("signupForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const firstName = document.getElementById("firstName").value.trim();
          const lastName = document.getElementById("lastName").value.trim();
          const email = document.getElementById("signupEmail").value.trim();
          const phone = document.getElementById("phone").value.trim();
          const password = document.getElementById("signupPassword").value;
          const confirmPassword =
            document.getElementById("confirmPassword").value;
          const errorDiv = document.getElementById("signupError");
          const successDiv = document.getElementById("signupSuccess");

          errorDiv.style.display = "none";
          successDiv.style.display = "none";

          if (
            !firstName ||
            !lastName ||
            !email ||
            !phone ||
            !password ||
            !confirmPassword
          ) {
            errorDiv.textContent = "Please fill in all fields";
            errorDiv.style.display = "block";
            return;
          }

          if (password !== confirmPassword) {
            errorDiv.textContent = "Passwords do not match";
            errorDiv.style.display = "block";
            return;
          }

          if (password.length < 6) {
            errorDiv.textContent = "Password must be at least 6 characters";
            errorDiv.style.display = "block";
            return;
          }

          if (!/^\d{10,}$/.test(phone.replace(/\D/g, ""))) {
            errorDiv.textContent =
              "Please enter a valid phone number (at least 10 digits)";
            errorDiv.style.display = "block";
            return;
          }

          const users = JSON.parse(localStorage.getItem("users") || "[]");
          if (users.find((u) => u.email === email)) {
            errorDiv.textContent = "Email already registered";
            errorDiv.style.display = "block";
            return;
          }

          users.push({ firstName, lastName, email, phone, password });
          localStorage.setItem("users", JSON.stringify(users));
          successDiv.textContent =
            "Account created successfully! Please login.";
          successDiv.style.display = "block";

          setTimeout(() => {
            toggleForms();
            document.getElementById("loginEmail").value = email;
            document.getElementById("loginPassword").value = "";
            document.getElementById("firstName").value = "";
            document.getElementById("lastName").value = "";
            document.getElementById("signupEmail").value = "";
            document.getElementById("phone").value = "";
            document.getElementById("signupPassword").value = "";
            document.getElementById("confirmPassword").value = "";
          }, 2000);
        });
    </script>
  </body>
</html>
