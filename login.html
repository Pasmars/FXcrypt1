<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00c853" />
    <link rel="manifest" href="manifest.json" />
    <title>Login - FXcrypt</title>
    <link rel="stylesheet" href="style.css?v=15" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body class="auth-page">
    <div class="auth-form" style="max-width: 460px; margin: 0 auto; width: 100%;">
      <div class="logo">
        <div class="app-logo-wrap">
          <div class="app-logo-circle"><img src="logo.png" alt="FXcrypt Logo" /></div>
          <span class="app-logo-text">FXCRYPT</span>
        </div>
      </div>

      <div id="authMessage" style="display:none; padding:12px; margin-bottom:20px; border-radius:4px; text-align:center; font-weight:500;"></div>

      <form id="loginForm">
        <h2>Log In</h2>
        <p style="text-align:center; color:#848E9C; margin-bottom:24px; font-size:14px;">
          Enter your email and password to sign in.
        </p>

        <div class="form-group">
          <label for="loginEmail">Email Address</label>
          <input type="email" id="loginEmail" required placeholder="you@example.com" autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div style="position:relative;">
            <input type="password" id="loginPassword" required placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" autocomplete="current-password" style="padding-right:44px;" />
            <button type="button" id="togglePwd" tabindex="-1" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:4px;color:#848E9C;font-size:13px;">Show</button>
          </div>
        </div>

        <div style="text-align:right; margin-top:-8px; margin-bottom:16px;">
          <a href="#" id="forgotPwdLink" style="color:#848E9C; font-size:13px; text-decoration:none;">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn" id="loginBtn">Log In</button>
      </form>

      <div style="text-align:center; margin-top:25px; color:#848E9C; font-size:14px;">
        Don't have an account? <a href="signup.html" style="color:#0ECB81; text-decoration:none; font-weight:500;">Sign Up</a>
      </div>
    </div>

    <script type="module">
      import {
        signInWithEmailAndPassword,
        sendPasswordResetEmail
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import { auth } from './firebase.js';

      const loginForm    = document.getElementById('loginForm');
      const loginBtn     = document.getElementById('loginBtn');
      const authMessage  = document.getElementById('authMessage');
      const togglePwd    = document.getElementById('togglePwd');
      const pwdInput     = document.getElementById('loginPassword');
      const forgotLink   = document.getElementById('forgotPwdLink');

      // Wait for Firebase to finish reading its persisted session before
      // deciding whether to redirect — avoids a false "not logged in" on first load.
      auth.authStateReady().then(() => {
        if (auth.currentUser) window.location.href = 'index.html';
      });

      // Show / hide password toggle
      togglePwd.addEventListener('click', () => {
        const isHidden = pwdInput.type === 'password';
        pwdInput.type  = isHidden ? 'text' : 'password';
        togglePwd.textContent = isHidden ? 'Hide' : 'Show';
      });

      function showMessage(msg, isError = false) {
        authMessage.style.display          = 'block';
        authMessage.textContent            = msg;
        authMessage.style.backgroundColor  = isError ? 'rgba(246,70,93,0.1)' : 'rgba(14,203,129,0.1)';
        authMessage.style.color            = isError ? '#F6465D' : '#0ECB81';
        // Ensure the message is visible even if the user scrolled
        authMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      // Auto-dismiss error messages when the user starts correcting input
      document.querySelectorAll('#loginForm input').forEach(input => {
        input.addEventListener('input', () => {
          if (authMessage.style.display !== 'none') {
            authMessage.style.display = 'none';
          }
        });
      });

      // Password reset
      forgotLink.addEventListener('click', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        if (!email) {
          showMessage('Enter your email address above first.', true);
          return;
        }
        try {
          await sendPasswordResetEmail(auth, email);
          showMessage('Password reset email sent — check your inbox.');
        } catch (err) {
          const msg = err.code === 'auth/user-not-found'
            ? 'No account found with that email address.'
            : err.code === 'auth/invalid-email'
            ? 'Please enter a valid email address.'
            : err.code === 'auth/network-request-failed'
            ? 'Network error. Please check your connection.'
            : err.message;
          showMessage(msg, true);
        }
      });

      // Sign in
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email    = document.getElementById('loginEmail').value.trim();
        const password = pwdInput.value;

        loginBtn.disabled     = true;
        loginBtn.textContent  = 'Logging In...';
        authMessage.style.display = 'none';

        try {
          await signInWithEmailAndPassword(auth, email, password);
          window.location.href = 'index.html';
        } catch (err) {
          const msg = err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password'
            ? 'Incorrect email or password.'
            : err.code === 'auth/user-not-found'
            ? 'No account found with that email.'
            : err.code === 'auth/too-many-requests'
            ? 'Too many failed attempts. Try again later or reset your password.'
            : err.code === 'auth/network-request-failed'
            ? 'Network error. Please check your connection and try again.'
            : err.message;
          showMessage(msg, true);
          loginBtn.disabled    = false;
          loginBtn.textContent = 'Log In';
        }
      });
    </script>
  </body>
</html>
