<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Go Premium - FXcrypt</title>
<link rel="manifest" href="manifest.json" />
<link rel="stylesheet" href="style.css" />
<style>
  .pm-wrap{max-width:560px;margin:0 auto;padding:18px 16px 40px;color:var(--text,#E7ECF2)}
  .pm-head{text-align:center;margin-bottom:18px}
  .pm-badge{width:60px;height:60px;border-radius:18px;background:#3B82F6;display:inline-flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 10px 30px rgba(59,130,246,.4);margin-bottom:10px}
  .pm-title{font-size:24px;font-weight:800;letter-spacing:-.5px}
  .pm-sub{font-size:14px;color:#8A94A3;margin-top:5px}
  .tier{position:relative;background:#12161C;border:1px solid #232932;border-radius:16px;padding:16px;cursor:pointer;margin-bottom:11px;transition:all .15s}
  .tier.on{border-color:#3B82F6;box-shadow:0 0 0 1px #3B82F6,0 8px 24px rgba(59,130,246,.25)}
  .tier .row{display:flex;align-items:center;gap:11px}
  .dot{width:22px;height:22px;border-radius:50%;border:2px solid #2b3340;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .tier.on .dot{border:none;background:#3B82F6}
  .tier .nm{font-size:17px;font-weight:800}
  .tier .pr{font-size:19px;font-weight:800;text-align:right}
  .tier .pr small{font-size:12.5px;color:#8A94A3;font-weight:600}
  .feats{margin-top:13px;padding-top:13px;border-top:1px solid #232932;display:none;flex-direction:column;gap:7px}
  .tier.on .feats{display:flex}
  .feat{display:flex;gap:9px;font-size:13.5px;color:#C2CAD4}
  .pill{display:inline-block;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700;background:#1A1F27;color:#8A94A3}
  .pill.acc{background:rgba(59,130,246,.18);color:#3B82F6}
  .btn{display:block;width:100%;background:#3B82F6;color:#fff;border:none;border-radius:12px;padding:15px;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit;text-align:center}
  .btn:disabled{opacity:.6}
  .btn.soft{background:#1A1F27;color:#E7ECF2}
  .opt{display:flex;align-items:center;gap:13px;background:#12161C;border:1px solid #232932;border-radius:14px;padding:15px;cursor:pointer;width:100%;text-align:left;font-family:inherit;color:inherit;margin-bottom:11px}
  .opt .ic{width:42px;height:42px;border-radius:13px;background:#1A1F27;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
  .opt .t{font-size:14.5px;font-weight:700}.opt .s{font-size:12.5px;color:#8A94A3}
  .chip{background:#1A1F27;border:1px solid #232932;color:#C2CAD4;border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}
  .chip.on{background:#3B82F6;border-color:#3B82F6;color:#fff}
  .card2{background:#12161C;border:1px solid #232932;border-radius:14px;padding:16px}
  .mono{font-family:ui-monospace,monospace;font-size:12.5px;word-break:break-all}
  .warn{display:flex;gap:9px;background:rgba(239,68,68,.12);border-radius:11px;padding:10px 12px;font-size:12px;color:#cdd5df;line-height:1.45;margin:10px 0}
  .err{margin-top:12px;font-size:13px;color:#EF4444;background:rgba(239,68,68,.12);border-radius:11px;padding:10px 12px;font-weight:600}
  .ok{margin-top:12px;font-size:13px;color:#22C55E;background:rgba(34,197,94,.12);border-radius:11px;padding:10px 12px;font-weight:600}
  .back{background:none;border:none;color:#8A94A3;cursor:pointer;font-family:inherit;font-size:14px;display:flex;align-items:center;gap:5px;padding:4px 0 12px}
  .muted{color:#8A94A3}
  .spin{width:18px;height:18px;border:2.5px solid #2b3340;border-top-color:#3B82F6;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="pm-wrap">
    <button class="back" onclick="window.location.href='profile.html'">‹ Back to profile</button>
    <div id="banner"></div>

    <!-- PLANS -->
    <div id="plans">
      <div class="pm-head">
        <div class="pm-badge">⭐</div>
        <div class="pm-title">Unlock FXcrypt Premium</div>
        <div class="pm-sub">Lower fees, full automation, unlimited AI. Pay by card or crypto.</div>
      </div>
      <div id="tiers"></div>
      <button class="btn" id="continue" style="margin-top:8px">Upgrade</button>
      <div style="text-align:center;margin-top:12px;font-size:11.5px;color:#5A6472">🔒 Card or crypto · Cancel anytime</div>
    </div>

    <!-- METHOD -->
    <div id="method" style="display:none">
      <div class="pm-title" style="font-size:21px" id="methodTitle">Pay for Pro</div>
      <div class="pm-sub" style="margin-bottom:16px">Choose how you’d like to pay.</div>
      <button class="opt" data-m="subscription"><div class="ic">💳</div><div style="flex:1"><div class="t">Card · Monthly subscription</div><div class="s">Auto-renews monthly · cancel anytime</div></div><span class="muted" id="m1"></span></button>
      <button class="opt" data-m="onetime"><div class="ic">📅</div><div style="flex:1"><div class="t">Card · One-time (30 days)</div><div class="s">Single payment, 30 days of access</div></div><span class="muted" id="m2"></span></button>
      <button class="opt" id="goCrypto"><div class="ic">🪙</div><div style="flex:1"><div class="t">Pay with crypto</div><div class="s">USDT / USDC / native on ETH, BSC, Base, SOL</div></div><span class="muted">›</span></button>
      <div id="methodErr"></div>
      <button class="btn soft" id="methodBack" style="margin-top:8px">Back</button>
    </div>

    <!-- CRYPTO -->
    <div id="crypto" style="display:none">
      <div class="pm-title" style="font-size:21px">Pay with crypto</div>
      <div class="pm-sub" id="cryptoSub" style="margin-bottom:16px">Pro · 30 days access</div>
      <div class="muted" style="font-size:12.5px;font-weight:700;margin-bottom:8px">Network</div>
      <div id="chains" style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px"></div>
      <div class="muted" style="font-size:12.5px;font-weight:700;margin-bottom:8px">Asset</div>
      <div id="assets" style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px"></div>
      <button class="btn" id="genInvoice">Show payment details</button>
      <div id="invoice" style="margin-top:14px"></div>
      <div id="cryptoErr"></div>
      <button class="btn soft" id="cryptoBack" style="margin-top:10px">Back</button>
    </div>
  </div>

  <script type="module">
    import { requireAuth } from './authObserver.js';
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { httpsCallable } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-functions.js";
    import { db, fns } from './firebase.js';

    const call = (n, d) => httpsCallable(fns, n)(d || {}).then(r => r.data);
    const $ = id => document.getElementById(id);
    const PRICES = { pro: 29, elite: 99 };
    const TIERS = [
      { id: 'pro', name: 'Pro', price: '$29', fee: '0.5%', popular: true, feats: ['Unlimited + auto gem scans', '200 Pointer messages/day', 'Custom alerts + push', 'Full signals + Telegram', 'Automation (SL/TP/DCA)', '5 wallets / exchanges'] },
      { id: 'elite', name: 'Elite', price: '$99', fee: '0.2%', feats: ['Everything in Pro, plus', 'Lowest 0.2% swap fee', 'Unlimited automation', 'Priority execution & support', 'Unlimited wallets'] },
    ];
    const CHAINS = [
      { id: 'eth', label: 'Ethereum', assets: ['usdt','usdc','native'], native: 'ETH' },
      { id: 'bsc', label: 'BNB Chain', assets: ['usdt','usdc','native'], native: 'BNB' },
      { id: 'base', label: 'Base', assets: ['usdc','native'], native: 'ETH' },
      { id: 'sol', label: 'Solana', assets: ['native'], native: 'SOL' },
    ];
    const assetLabel = (c, a) => a === 'native' ? (CHAINS.find(x=>x.id===c)||{}).native : a.toUpperCase();

    let sel = 'pro', curPlan = 'free';
    let cChain = 'eth', cAsset = 'usdt', invoice = null;

    // Stripe return banner
    const q = new URLSearchParams(location.search).get('upgrade');
    if (q === 'success') $('banner').innerHTML = '<div class="ok">✅ Payment received! Your premium access is being activated — it may take a few seconds to reflect.</div>';
    else if (q === 'cancel') $('banner').innerHTML = '<div class="err">Checkout canceled. You can try again any time.</div>';

    function renderTiers(){
      $('tiers').innerHTML = TIERS.map(t => `
        <div class="tier ${sel===t.id?'on':''}" data-id="${t.id}">
          <div class="row">
            <div class="dot">${sel===t.id?'<span style="color:#fff;font-weight:900">✓</span>':''}</div>
            <div style="flex:1"><span class="nm">${t.name}</span> <span class="pill ${t.id==='pro'?'acc':''}">${t.fee} swap fee</span> ${t.popular?'<span class="pill acc">POPULAR</span>':''}</div>
            <div class="pr">${t.price}<small>/mo</small></div>
          </div>
          <div class="feats">${t.feats.map(f=>`<div class="feat"><span style="color:#3B82F6">✓</span><span>${f}</span></div>`).join('')}</div>
        </div>`).join('');
      $('tiers').querySelectorAll('.tier').forEach(el => el.onclick = () => { sel = el.dataset.id; renderTiers(); });
    }

    function show(which){ ['plans','method','crypto'].forEach(s => $(s).style.display = s===which?'block':'none'); }

    function renderCrypto(){
      $('cryptoSub').textContent = (sel==='elite'?'Elite':'Pro') + ' · 30 days access';
      $('chains').innerHTML = CHAINS.map(c=>`<button class="chip ${cChain===c.id?'on':''}" data-c="${c.id}">${c.label}</button>`).join('');
      const assets = (CHAINS.find(c=>c.id===cChain)||{}).assets || ['native'];
      if (!assets.includes(cAsset)) cAsset = assets[0];
      $('assets').innerHTML = assets.map(a=>`<button class="chip ${cAsset===a?'on':''}" data-a="${a}">${assetLabel(cChain,a)}</button>`).join('');
      $('chains').querySelectorAll('.chip').forEach(b=>b.onclick=()=>{ cChain=b.dataset.c; invoice=null; $('invoice').innerHTML=''; renderCrypto(); });
      $('assets').querySelectorAll('.chip').forEach(b=>b.onclick=()=>{ cAsset=b.dataset.a; invoice=null; $('invoice').innerHTML=''; renderCrypto(); });
    }

    async function stripe(billing){
      $('methodErr').innerHTML = '';
      const ev = document.querySelector(`.opt[data-m="${billing}"] .muted`); if (ev) ev.innerHTML = '<span class="spin"></span>';
      try {
        const { url } = await call('createStripeCheckout', { plan: sel, billing });
        if (url) location.href = url; else throw new Error('Could not start checkout');
      } catch(e){ $('methodErr').innerHTML = `<div class="err">${e.message}</div>`; if(ev) ev.textContent=''; }
    }

    async function genInvoice(){
      $('cryptoErr').innerHTML=''; $('genInvoice').disabled = true; $('genInvoice').textContent='Creating invoice…';
      try {
        invoice = await call('createCryptoInvoice', { plan: sel, chain: cChain, asset: cAsset });
        renderInvoice();
      } catch(e){ $('cryptoErr').innerHTML = `<div class="err">${e.message}</div>`; }
      finally { $('genInvoice').disabled=false; $('genInvoice').textContent='Show payment details'; }
    }

    function renderInvoice(){
      if (!invoice) return;
      const chainLabel = (CHAINS.find(c=>c.id===invoice.chain)||{}).label;
      $('genInvoice').style.display='none';
      $('invoice').innerHTML = `
        <div class="card2">
          <div style="text-align:center;margin-bottom:12px">
            <div class="muted" style="font-size:12.5px">Send exactly</div>
            <div style="font-size:26px;font-weight:800;letter-spacing:-.5px;margin:2px 0">${invoice.amountToken} ${invoice.symbol}</div>
            <div class="muted" style="font-size:12.5px">≈ $${invoice.amountUsd} · on ${chainLabel}</div>
          </div>
          <div class="muted" style="font-size:11.5px;font-weight:700;margin-bottom:5px">To this address</div>
          <button id="copyAddr" style="width:100%;display:flex;gap:8px;align-items:center;background:#1A1F27;border:none;border-radius:11px;padding:11px 13px;cursor:pointer;color:inherit;font-family:inherit;margin-bottom:8px">
            <span class="mono" style="flex:1;text-align:left">${invoice.address}</span><span style="color:#3B82F6">copy</span>
          </button>
          ${invoice.tokenContract?`<div style="font-size:11px;color:#5A6472;margin-bottom:8px">Token: <span class="mono">${invoice.tokenContract}</span></div>`:''}
          <div class="warn">⚠️ Send only <b>${invoice.symbol}</b> on <b>${chainLabel}</b>. Other tokens/chains will be lost. Send the exact amount or slightly more.</div>
          <button class="btn" id="verify">I've sent it — verify</button>
        </div>`;
      $('copyAddr').onclick = () => { navigator.clipboard.writeText(invoice.address); $('copyAddr').querySelector('span:last-child').textContent='copied'; };
      $('verify').onclick = verifyPay;
    }

    async function verifyPay(){
      $('cryptoErr').innerHTML=''; const b=$('verify'); b.disabled=true; b.innerHTML='<span class="spin"></span> Checking the blockchain…';
      try {
        const r = await call('verifyCryptoPayment', { invoiceId: invoice.invoiceId });
        if (r.status === 'paid') {
          $('crypto').innerHTML = `<div style="text-align:center;padding:30px 10px"><div style="font-size:54px">✅</div><div class="pm-title" style="margin-top:8px">You’re ${sel==='elite'?'Elite':'Pro'}!</div><div class="pm-sub" style="margin:8px auto;max-width:300px">Payment confirmed on-chain. Premium is active for 30 days.</div><button class="btn" onclick="location.href='profile.html'" style="margin-top:14px">Done</button></div>`;
        } else { $('cryptoErr').innerHTML = '<div class="err">Payment not detected yet. If you just sent it, wait ~30s and try again.</div>'; b.disabled=false; b.textContent="I've sent it — verify"; }
      } catch(e){ $('cryptoErr').innerHTML = `<div class="err">${e.message}</div>`; b.disabled=false; b.textContent="I've sent it — verify"; }
    }

    // wire static buttons
    $('continue').onclick = () => { $('methodTitle').textContent = 'Pay for ' + (sel==='elite'?'Elite':'Pro'); $('m1').textContent='›'; $('m2').textContent='›'; show('method'); };
    $('methodBack').onclick = () => show('plans');
    $('cryptoBack').onclick = () => show('method');
    $('goCrypto').onclick = () => { renderCrypto(); $('invoice').innerHTML=''; $('genInvoice').style.display='block'; invoice=null; show('crypto'); };
    $('genInvoice').onclick = genInvoice;
    document.querySelectorAll('.opt[data-m]').forEach(o => o.onclick = () => stripe(o.dataset.m));

    renderTiers();

    requireAuth(async (user) => {
      try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        const d = snap.exists() ? snap.data() : {};
        const expired = d.planExpiry && d.planExpiry < Date.now();
        curPlan = (!d.plan || expired) ? 'free' : d.plan;
        if (curPlan !== 'free') {
          $('banner').innerHTML = `<div class="ok">You're on the <b>${curPlan==='elite'?'Elite':'Pro'}</b> plan${d.planExpiry?` · renews/expires ${new Date(d.planExpiry).toLocaleDateString()}`:''}. Upgrading again extends or changes it.</div>` + $('banner').innerHTML;
          if (curPlan === 'elite') sel = 'elite';
          renderTiers();
        }
      } catch(e){}
    });
  </script>
  <script>
    if ("serviceWorker" in navigator) { window.addEventListener("load", () => navigator.serviceWorker.register("service-worker.js").catch(()=>{})); }
  </script>
</body>
</html>
