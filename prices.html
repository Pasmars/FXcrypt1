<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00c853" />
    <link rel="manifest" href="manifest.json" />
    <title>Crypto Prices - FXcrypt</title>
    <link rel="stylesheet" href="style.css?v=15" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Top nav bar: hamburger left, profile right -->
    <div class="top-nav-bar">
      <div class="menu-nav">
        <button id="menuBtn" class="menu-btn" title="Menu" aria-label="Open menu">
          <span class="menu-icon">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
      </div>
      <div class="profile-nav">
        <a href="profile.html" class="profile-btn" title="View Profile">
          <span id="profileInitials"></span>
        </a>
      </div>
    </div>

    <!-- Side drawer menu -->
    <div id="sideMenu" class="side-menu">
      <div class="side-menu-header">
        <span class="side-menu-title">Menu</span>
        <button id="closeMenuBtn" class="close-menu-btn" aria-label="Close menu">&times;</button>
      </div>
      <ul class="side-menu-list">
        <li><a href="profile.html">My Profile</a></li>
        <li><a href="prices.html">Crypto Prices</a></li>
        <li><a href="tracker.html">Token Tracker</a></li>
        <li><a href="bot.html">DEX Bot</a></li>
        <li><a href="agent.html">AI Agent</a></li>
        <li><a href="wallet.html">Wallet</a></li>
        <li>
          <button id="sideLogoutBtn" class="side-logout-btn">Logout</button>
        </li>
      </ul>
    </div>

    <div class="container tracker-container">
      <div class="app-logo-wrap">
        <div class="app-logo-circle"><img src="logo.png" alt="FXcrypt Logo" /></div>
        <span class="app-logo-text">FXCRYPT</span>
      </div>
      <nav class="menu-tabs">
        <a href="index.html"   class="tab">PnL Calc</a>
        <a href="prices.html"  class="tab active">Prices</a>
        <a href="tracker.html" class="tab">Tracker</a>
        <a href="bot.html"     class="tab">DEX Bot</a>
        <a href="agent.html"   class="tab">AI Agent</a>
        <a href="wallet.html"  class="tab">Wallet</a>
      </nav>
      <div id="pricesSection">
        <div class="crypto-section-header">
          <div>
            <h3>Crypto Prices</h3>
            <div class="crypto-coin-count" id="coinCountLabel"></div>
          </div>
          <div class="refresh-indicator">
            <span class="refresh-dot"></span>
            <span class="refresh-label" id="priceRefreshLabel">Auto-refresh: 60s</span>
          </div>
        </div>

        <!-- Search bar -->
        <div class="crypto-search-wrap">
          <span class="crypto-search-icon">&#128269;</span>
          <input
            type="text"
            id="cryptoSearchInput"
            class="crypto-search-input"
            placeholder="Search coin name or symbol..."
            autocomplete="off"
            spellcheck="false"
          />
          <button class="crypto-search-clear" id="cryptoSearchClear" title="Clear search">&times;</button>
        </div>

        <div id="searchResultsLabel" class="search-results-label" style="display:none;"></div>
        <div id="pricesTableWrap" style="overflow-x:auto;">
          <div class="loading-msg"><span class="spinner"></span>Loading cryptocurrencies...</div>
        </div>
        <button class="load-more-btn" id="loadMoreBtn" style="display:none;">Load More Coins</button>
      </div>
    </div>

    <!-- Coin Detail Modal -->
    <div class="coin-modal-overlay" id="coinModalOverlay"></div>
    <div class="coin-modal-sheet" id="coinModalSheet">
      <div class="coin-modal-drag-bar"></div>
      <div id="coinModalBody">
        <div class="coin-modal-loading"><span class="spinner"></span><br>Loading details...</div>
      </div>
    </div>

    <script type="module">
      import { requireAuth } from './authObserver.js';
      import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
      import { auth, db } from './firebase.js';

      const CG_BASE = "https://api.coingecko.com/api/v3";
      const PER_PAGE = 250;

      let currentPage = 1;
      let allLoadedCoins = [];
      let isSearchMode = false;
      let searchDebounceTimer = null;
      let priceCountdown = 60;
      let priceTimer = null;
      let isLoading = false;

      function fmtUSD(n) {
        if (n == null) return '—';
        if (n >= 1e12) return `$${(n/1e12).toFixed(2)}T`;
        if (n >= 1e9)  return `$${(n/1e9).toFixed(2)}B`;
        if (n >= 1e6)  return `$${(n/1e6).toFixed(2)}M`;
        if (n >= 1e3)  return `$${(n/1e3).toFixed(2)}K`;
        return `$${n.toFixed(2)}`;
      }

      function fmtPrice(n) {
        if (n == null) return '—';
        if (n >= 1) return `$${n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2})}`;
        if (n >= 0.0001) return `$${n.toFixed(6)}`;
        return `$${n.toExponential(4)}`;
      }

      function buildTableHTML(coins) {
        if (!coins.length) return `<div class="no-results-msg">No coins found.</div>`;
        const rows = coins.map(c => {
          const ch = c.price_change_percentage_24h || 0;
          const cls = ch >= 0 ? 'price-up' : 'price-down';
          const arrow = ch >= 0 ? '▲' : '▼';
          return `<tr data-coin-id="${c.id}">
            <td style="color:#848E9C;">${c.market_cap_rank ?? '—'}</td>
            <td style="display:flex;align-items:center;gap:8px;">
              <img src="${c.image}" alt="" width="24" height="24" style="border-radius:50%;flex-shrink:0;" onerror="this.style.display='none'"/>
              <span>${c.name}</span>
              <span style="color:#848E9C;font-size:11px;text-transform:uppercase;">${c.symbol}</span>
            </td>
            <td style="font-weight:600;">${fmtPrice(c.current_price)}</td>
            <td class="${cls}" style="font-weight:600;">${arrow} ${Math.abs(ch).toFixed(2)}%</td>
            <td>${fmtUSD(c.market_cap)}</td>
            <td>${fmtUSD(c.total_volume)}</td>
          </tr>`;
        }).join('');
        return `<table class="holdings-table">
          <thead><tr><th>#</th><th>Name</th><th>Price</th><th>24h</th><th>Market Cap</th><th>Volume</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      }

      // ── Sparkline SVG builder ──
      function buildSparkline(prices, isPositive) {
        if (!prices || prices.length < 2) return '';
        const W = 600, H = 70, PAD = 4;
        const min = Math.min(...prices), max = Math.max(...prices);
        const range = max - min || 1;
        const pts = prices.map((p, i) => {
          const x = PAD + (i / (prices.length - 1)) * (W - PAD * 2);
          const y = PAD + (1 - (p - min) / range) * (H - PAD * 2);
          return `${x.toFixed(1)},${y.toFixed(1)}`;
        }).join(' ');
        const color = isPositive ? '#0ECB81' : '#F6465D';
        // Build fill path (close below the chart)
        const firstX = PAD, lastX = (W - PAD).toFixed(1);
        const fillPts = `${firstX},${H} ` + pts + ` ${lastX},${H}`;
        return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="spGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <polygon points="${fillPts}" fill="url(#spGrad)"/>
          <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>`;
      }

      // ── Modal helpers ──
      function openModal() {
        document.getElementById("coinModalOverlay").classList.add("open");
        document.getElementById("coinModalSheet").classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function closeModal() {
        document.getElementById("coinModalOverlay").classList.remove("open");
        document.getElementById("coinModalSheet").classList.remove("open");
        document.body.style.overflow = "";
      }

      function fmtPct(n) {
        if (n == null) return '—';
        const cls = n >= 0 ? 'price-up' : 'price-down';
        const arrow = n >= 0 ? '▲' : '▼';
        return `<span class="${cls}">${arrow} ${Math.abs(n).toFixed(2)}%</span>`;
      }

      function stripHTML(html) {
        const d = document.createElement('div');
        d.innerHTML = html;
        return d.textContent || d.innerText || '';
      }

      async function openCoinDetail(coinId) {
        const body = document.getElementById("coinModalBody");
        body.innerHTML = `<div class="coin-modal-loading"><span class="spinner"></span><br>Loading details...</div>`;
        openModal();
        try {
          const res = await fetch(
            `${CG_BASE}/coins/${coinId}?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false&sparkline=true`
          );
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const c = await res.json();
          const md = c.market_data || {};
          const price = md.current_price?.usd;
          const ch24 = md.price_change_percentage_24h;
          const isPos = (ch24 || 0) >= 0;
          const sparkPrices = md.sparkline_7d?.price || [];

          // Links
          const homepage = (c.links?.homepage || []).find(l => l);
          const explorer = (c.links?.blockchain_site || []).find(l => l);
          const reddit   = c.links?.subreddit_url;
          const links = [
            homepage && `<a href="${homepage}" target="_blank" rel="noopener" class="coin-link-btn">Website</a>`,
            explorer && `<a href="${explorer}" target="_blank" rel="noopener" class="coin-link-btn">Explorer</a>`,
            reddit   && `<a href="${reddit}"   target="_blank" rel="noopener" class="coin-link-btn">Reddit</a>`,
          ].filter(Boolean).join('');

          // Description
          const rawDesc = c.description?.en || '';
          const desc = stripHTML(rawDesc).trim();

          body.innerHTML = `
            <div class="coin-modal-header">
              <img class="coin-modal-logo" src="${c.image?.large || c.image?.small || ''}" alt="" onerror="this.style.display='none'"/>
              <div class="coin-modal-title-wrap">
                <div class="coin-modal-name">${c.name}</div>
                <div class="coin-modal-symbol">${c.symbol?.toUpperCase()} ${c.market_cap_rank ? '· #' + c.market_cap_rank : ''}</div>
              </div>
              <button class="coin-modal-close" id="coinModalCloseBtn">&times;</button>
            </div>

            <div class="coin-modal-price-row">
              <span class="coin-modal-price">${fmtPrice(price)}</span>
              <span class="coin-modal-change">${fmtPct(ch24)}</span>
              <span style="font-size:11px;color:#848E9C;margin-left:4px;">24h</span>
            </div>

            ${sparkPrices.length > 1 ? `<div class="coin-sparkline-wrap">${buildSparkline(sparkPrices, isPos)}</div>` : ''}

            <div class="coin-modal-section">
              <div class="coin-modal-section-title">Price Stats</div>
              <div class="coin-stats-grid">
                <div class="coin-stat-item">
                  <div class="coin-stat-label">24h High</div>
                  <div class="coin-stat-value">${fmtPrice(md.high_24h?.usd)}</div>
                </div>
                <div class="coin-stat-item">
                  <div class="coin-stat-label">24h Low</div>
                  <div class="coin-stat-value">${fmtPrice(md.low_24h?.usd)}</div>
                </div>
                <div class="coin-stat-item">
                  <div class="coin-stat-label">All-Time High</div>
                  <div class="coin-stat-value">${fmtPrice(md.ath?.usd)}</div>
                </div>
                <div class="coin-stat-item">
                  <div class="coin-stat-label">All-Time Low</div>
                  <div class="coin-stat-value">${fmtPrice(md.atl?.usd)}</div>
                </div>
              </div>
            </div>

            <div class="coin-modal-section">
              <div class="coin-modal-section-title">Market Stats</div>
              <div class="coin-stats-grid">
                <div class="coin-stat-item">
                  <div class="coin-stat-label">Market Cap</div>
                  <div class="coin-stat-value">${fmtUSD(md.market_cap?.usd)}</div>
                </div>
                <div class="coin-stat-item">
                  <div class="coin-stat-label">24h Volume</div>
                  <div class="coin-stat-value">${fmtUSD(md.total_volume?.usd)}</div>
                </div>
                <div class="coin-stat-item">
                  <div class="coin-stat-label">Circulating Supply</div>
                  <div class="coin-stat-value">${md.circulating_supply ? md.circulating_supply.toLocaleString(undefined,{maximumFractionDigits:0}) : '—'}</div>
                </div>
                <div class="coin-stat-item">
                  <div class="coin-stat-label">Max Supply</div>
                  <div class="coin-stat-value">${md.max_supply ? md.max_supply.toLocaleString(undefined,{maximumFractionDigits:0}) : '∞'}</div>
                </div>
              </div>
            </div>

            <div class="coin-modal-section">
              <div class="coin-modal-section-title">Price Change</div>
            </div>
            <div class="coin-change-row">
              <div class="coin-change-pill"><div class="pill-label">24h</div><div class="pill-val">${fmtPct(md.price_change_percentage_24h)}</div></div>
              <div class="coin-change-pill"><div class="pill-label">7d</div><div class="pill-val">${fmtPct(md.price_change_percentage_7d)}</div></div>
              <div class="coin-change-pill"><div class="pill-label">30d</div><div class="pill-val">${fmtPct(md.price_change_percentage_30d)}</div></div>
              <div class="coin-change-pill"><div class="pill-label">1yr</div><div class="pill-val">${fmtPct(md.price_change_percentage_1y)}</div></div>
            </div>

            ${links ? `<div class="coin-modal-section"><div class="coin-modal-section-title">Links</div></div><div class="coin-links-row">${links}</div>` : ''}

            ${desc ? `
            <div class="coin-desc">
              <div class="coin-modal-section-title" style="margin-bottom:8px;">About ${c.name}</div>
              <div class="coin-desc-text" id="coinDescText">${desc}</div>
              <button class="coin-desc-toggle" id="coinDescToggle">Read more</button>
            </div>` : ''}
          `;

          document.getElementById("coinModalCloseBtn").addEventListener("click", closeModal);

          const descText = document.getElementById("coinDescText");
          const descToggle = document.getElementById("coinDescToggle");
          if (descToggle && descText) {
            descToggle.addEventListener("click", () => {
              const expanded = descText.classList.toggle("expanded");
              descToggle.textContent = expanded ? "Show less" : "Read more";
            });
          }
        } catch (e) {
          body.innerHTML = `
            <div style="padding:16px;">
              <button class="coin-modal-close" id="coinModalCloseBtn" style="margin-left:auto;display:block;">&times;</button>
            </div>
            <div class="coin-modal-error">&#x274C; Failed to load coin details.<br><small>${e.message}</small></div>`;
          document.getElementById("coinModalCloseBtn").addEventListener("click", closeModal);
          console.error("Coin detail error:", e);
        }
      }

      async function fetchMarketPage(page) {
        const url = `${CG_BASE}/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=${PER_PAGE}&page=${page}&sparkline=false&price_change_percentage=24h`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`CoinGecko error ${res.status}`);
        return res.json();
      }

      async function loadInitialCoins() {
        const wrap = document.getElementById("pricesTableWrap");
        const countLabel = document.getElementById("coinCountLabel");
        wrap.innerHTML = `<div class="loading-msg"><span class="spinner"></span>Loading cryptocurrencies...</div>`;
        try {
          const coins = await fetchMarketPage(1);
          allLoadedCoins = coins;
          currentPage = 1;
          wrap.innerHTML = buildTableHTML(allLoadedCoins);
          countLabel.textContent = `Showing ${allLoadedCoins.length} coins`;
          document.getElementById("loadMoreBtn").style.display = "block";
        } catch (e) {
          wrap.innerHTML = `<div class="tracker-error">&#x274C; Failed to load coins. Will retry...</div>`;
          console.error("Price fetch error:", e);
        }
      }

      async function loadMoreCoins() {
        if (isLoading) return;
        isLoading = true;
        const btn = document.getElementById("loadMoreBtn");
        btn.disabled = true;
        btn.textContent = "Loading...";
        try {
          const coins = await fetchMarketPage(currentPage + 1);
          if (coins.length === 0) {
            btn.style.display = "none";
            return;
          }
          currentPage++;
          allLoadedCoins = [...allLoadedCoins, ...coins];
          document.getElementById("pricesTableWrap").innerHTML = buildTableHTML(allLoadedCoins);
          document.getElementById("coinCountLabel").textContent = `Showing ${allLoadedCoins.length} coins`;
          if (coins.length < PER_PAGE) btn.style.display = "none";
        } catch (e) {
          console.error("Load more error:", e);
        } finally {
          isLoading = false;
          btn.disabled = false;
          btn.textContent = "Load More Coins";
        }
      }

      async function searchCoins(query) {
        const wrap = document.getElementById("pricesTableWrap");
        const label = document.getElementById("searchResultsLabel");
        const loadMoreBtn = document.getElementById("loadMoreBtn");
        const countLabel = document.getElementById("coinCountLabel");

        if (!query.trim()) {
          isSearchMode = false;
          label.style.display = "none";
          loadMoreBtn.style.display = "block";
          wrap.innerHTML = buildTableHTML(allLoadedCoins);
          countLabel.textContent = `Showing ${allLoadedCoins.length} coins`;
          return;
        }

        isSearchMode = true;
        loadMoreBtn.style.display = "none";
        label.style.display = "block";

        // First try filtering from already-loaded coins (fast, instant)
        const q = query.toLowerCase();
        const localMatches = allLoadedCoins.filter(c =>
          c.name.toLowerCase().includes(q) || c.symbol.toLowerCase().includes(q)
        );

        if (localMatches.length > 0) {
          wrap.innerHTML = buildTableHTML(localMatches);
          label.textContent = `${localMatches.length} result${localMatches.length !== 1 ? 's' : ''} for "${query}"`;
          countLabel.textContent = '';
          return;
        }

        // No local match — query CoinGecko search endpoint
        label.textContent = `Searching for "${query}"...`;
        wrap.innerHTML = `<div class="loading-msg"><span class="spinner"></span>Searching...</div>`;
        try {
          const res = await fetch(`${CG_BASE}/search?query=${encodeURIComponent(query)}`);
          if (!res.ok) throw new Error("Search failed");
          const data = await res.json();
          const coins = (data.coins || []).slice(0, 50);
          if (coins.length === 0) {
            wrap.innerHTML = `<div class="no-results-msg">No coins found for "<strong>${query}</strong>".</div>`;
            label.textContent = `No results for "${query}"`;
            countLabel.textContent = '';
            return;
          }
          // Fetch market data for the matched coin IDs
          const ids = coins.map(c => c.id).join(',');
          const marketRes = await fetch(`${CG_BASE}/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&sparkline=false&price_change_percentage=24h`);
          if (!marketRes.ok) throw new Error("Market data fetch failed");
          const marketData = await marketRes.json();
          wrap.innerHTML = buildTableHTML(marketData);
          label.textContent = `${marketData.length} result${marketData.length !== 1 ? 's' : ''} for "${query}"`;
          countLabel.textContent = '';
        } catch (e) {
          wrap.innerHTML = `<div class="tracker-error">&#x274C; Search failed. Please try again.</div>`;
          label.textContent = `Search error`;
          console.error("Search error:", e);
        }
      }

      function startPriceRefresh() {
        priceCountdown = 60;
        updateLabel();
        if (priceTimer) clearInterval(priceTimer);
        priceTimer = setInterval(() => {
          priceCountdown--;
          updateLabel();
          if (priceCountdown <= 0) {
            priceCountdown = 60;
            if (!isSearchMode) loadInitialCoins();
          }
        }, 1000);
      }

      function updateLabel() {
        const el = document.getElementById("priceRefreshLabel");
        if (el) el.textContent = `Auto-refresh: ${priceCountdown}s`;
      }

      document.addEventListener("DOMContentLoaded", function () {
        requireAuth(async (user) => {
          let initials = user.email[0].toUpperCase();
          document.getElementById("profileInitials").textContent = initials;

          try {
            const docRef = doc(db, "users", user.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
              const data = docSnap.data();
              if (data.firstName || data.lastName) {
                const f = data.firstName ? data.firstName[0] : "";
                const l = data.lastName ? data.lastName[0] : "";
                document.getElementById("profileInitials").textContent = (f + l).toUpperCase();
              }
            } else if (user.displayName) {
              const parts = user.displayName.split(" ");
              const f = parts[0] ? parts[0][0] : "";
              const l = parts.length > 1 ? parts[parts.length - 1][0] : "";
              document.getElementById("profileInitials").textContent = (f + l).toUpperCase() || initials;
            }
          } catch (e) {
            console.error("Error fetching user details from Firestore:", e);
          }

          await loadInitialCoins();
          startPriceRefresh();

          // Search input
          const searchInput = document.getElementById("cryptoSearchInput");
          const clearBtn = document.getElementById("cryptoSearchClear");

          searchInput.addEventListener("input", () => {
            const val = searchInput.value;
            clearBtn.classList.toggle("visible", val.length > 0);
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => searchCoins(val), 350);
          });

          clearBtn.addEventListener("click", () => {
            searchInput.value = "";
            clearBtn.classList.remove("visible");
            clearTimeout(searchDebounceTimer);
            searchCoins("");
            searchInput.focus();
          });

          // Load more
          document.getElementById("loadMoreBtn").addEventListener("click", loadMoreCoins);

          // Coin row click → open detail modal (event delegation)
          document.getElementById("pricesTableWrap").addEventListener("click", (e) => {
            const row = e.target.closest("tr[data-coin-id]");
            if (row) openCoinDetail(row.dataset.coinId);
          });

          // Close modal on overlay click
          document.getElementById("coinModalOverlay").addEventListener("click", closeModal);
        });

        // Menu open/close logic
        const menuBtn = document.getElementById("menuBtn");
        const sideMenu = document.getElementById("sideMenu");
        const closeMenuBtn = document.getElementById("closeMenuBtn");
        const menuOverlay = document.getElementById("menuOverlay");
        if (menuBtn && sideMenu && closeMenuBtn) {
          const openMenu = (e) => { e.stopPropagation(); sideMenu.classList.add("open"); menuOverlay?.classList.add("visible"); };
          const closeMenu = () => { sideMenu.classList.remove("open"); menuOverlay?.classList.remove("visible"); };
          menuBtn.addEventListener("click", openMenu);
          menuBtn.addEventListener("touchstart", openMenu);
          closeMenuBtn.addEventListener("click", closeMenu);
          closeMenuBtn.addEventListener("touchstart", closeMenu);
          menuOverlay?.addEventListener("click", closeMenu);
        }

        const sideLogoutBtn = document.getElementById("sideLogoutBtn");
        if (sideLogoutBtn) {
          sideLogoutBtn.onclick = function () {
            signOut(auth).then(() => { window.location.href = "login.html"; });
          };
        }
      });
    </script>
    <div id="menuOverlay" class="menu-overlay"></div>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("service-worker.js");
        });
      }
    </script>
  </body>
</html>
