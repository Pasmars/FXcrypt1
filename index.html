<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00c853" />
    <link rel="manifest" href="manifest.json" />
    <title>PnL Calculator - FXcrypt</title>
    <link rel="stylesheet" href="style.css?v=15" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="top-nav-bar">
      <div class="menu-nav">
        <button
          id="menuBtn"
          class="menu-btn"
          title="Menu"
          aria-label="Open menu"
        >
          <span class="menu-icon">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
      </div>
      <div class="profile-nav">
        <a href="profile.html" class="profile-btn" title="View Profile">
          <span id="profileInitials"></span>
        </a>
      </div>
    </div>
    <div id="sideMenu" class="side-menu">
      <div class="side-menu-header">
        <span class="side-menu-title">Menu</span>
        <button
          id="closeMenuBtn"
          class="close-menu-btn"
          aria-label="Close menu"
        >
          &times;
        </button>
      </div>
      <ul class="side-menu-list">
        <li><a href="profile.html">My Profile</a></li>
        <li><a href="prices.html">Crypto Prices</a></li>
        <li><a href="tracker.html">Token Tracker</a></li>
        <li><a href="bot.html">DEX Bot</a></li>
        <li><a href="agent.html">AI Agent</a></li>
        <li><a href="wallet.html">Wallet</a></li>
        <li>
          <button id="sideLogoutBtn" class="side-logout-btn">Logout</button>
        </li>
      </ul>
    </div>
    <div class="container tracker-container">
      <div class="app-logo-wrap">
        <div class="app-logo-circle"><img src="logo.png" alt="FXcrypt Logo" /></div>
        <span class="app-logo-text">FXCRYPT</span>
      </div>
      <nav class="menu-tabs">
        <a href="index.html"   class="tab active">PnL Calc</a>
        <a href="prices.html"  class="tab">Prices</a>
        <a href="tracker.html" class="tab">Tracker</a>
        <a href="bot.html"     class="tab">DEX Bot</a>
        <a href="agent.html"   class="tab">AI Agent</a>
        <a href="wallet.html"  class="tab">Wallet</a>
      </nav>
      <form id="pnlForm" novalidate>
        <label for="tradeType">Trade Type</label>
        <select id="tradeType" style="margin-bottom: 16px;">
          <option value="crypto">Crypto</option>
          <option value="forex">Forex</option>
        </select>

        <div id="cryptoOptions" style="display: block" class="crypto-options">
          <div class="position-toggles" id="positionToggles">
            <div class="pos-btn long active" data-pos="long">Long</div>
            <div class="pos-btn short" data-pos="short">Short</div>
          </div>
          <input type="hidden" id="positionType" value="long" />
          <label for="leverage">Leverage</label>
          <input type="number" id="leverage" step="any" value="20" min="1" />
        </div>

        <label for="entryPrice">Entry Price</label>
        <input type="number" id="entryPrice" step="any" required />
        <label for="exitPrice">Exit Price</label>
        <input type="number" id="exitPrice" step="any" required />
        <label for="capital" id="capitalLabel">Margin (Capital)</label>
        <input type="number" id="capital" step="any" />
        <div id="forexOptions" style="display: none" class="forex-options">
          <div class="position-toggles" id="forexPositionToggles">
            <div class="pos-btn long active" data-fpos="buy">BUY</div>
            <div class="pos-btn short" data-fpos="sell">SELL</div>
          </div>
          <input type="hidden" id="forexDirection" value="buy" />
          <div class="form-row">
            <label for="fxVolume">Volume (Lots)</label>
            <input type="number" id="fxVolume" step="any" value="1" min="0.01" />
          </div>
          <div class="form-row">
            <label for="contractSize">Contract Size</label>
            <input type="number" id="contractSize" step="any" value="100000" />
          </div>
          <div class="form-row">
            <label for="fxLeverage">Leverage</label>
            <input type="number" id="fxLeverage" step="any" value="500" min="1" />
          </div>
          <div class="form-row">
            <label for="exchangeRate">Acct. Currency Rate</label>
            <input type="number" id="exchangeRate" step="any" value="1" />
          </div>
          <div class="converter-section">
            <h3>Currency Converter</h3>
            <div class="form-row">
              <label for="fromCurrency">From</label>
              <select id="fromCurrency"></select>
            </div>
            <div class="form-row">
              <label for="toCurrency">To</label>
              <select id="toCurrency"></select>
            </div>
            <div class="form-row">
              <label for="convertAmount">Amount</label>
              <input
                type="number"
                id="convertAmount"
                step="any"
                placeholder="Enter amount"
              />
            </div>
            <button type="button" id="convertBtn" class="convert-button">
              Convert
            </button>
            <div id="converterResult" class="converter-result"></div>
          </div>
        </div>
        <button type="submit">Calculate PnL</button>
      </form>
      <div id="result"></div>
    </div>
    <div id="menuOverlay" class="menu-overlay"></div>
    <script type="module">
      import { requireAuth } from './authObserver.js';
      import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
      import { auth, db } from './firebase.js';

      document.addEventListener("DOMContentLoaded", function () {
        requireAuth(async (user) => {
          let initials = user.email[0].toUpperCase();
          document.getElementById("profileInitials").textContent = initials;

          try {
            const docRef = doc(db, "users", user.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
              const data = docSnap.data();
              if (data.firstName || data.lastName) {
                const f = data.firstName ? data.firstName[0] : "";
                const l = data.lastName ? data.lastName[0] : "";
                document.getElementById("profileInitials").textContent = (f + l).toUpperCase();
              }
            } else if (user.displayName) {
              const parts = user.displayName.split(" ");
              const f = parts[0] ? parts[0][0] : "";
              const l = parts.length > 1 ? parts[parts.length - 1][0] : "";
              document.getElementById("profileInitials").textContent = (f + l).toUpperCase() || initials;
            }
          } catch (e) {
            console.error("Error fetching user details from Firestore:", e);
          }
        });

        // Menu open/close logic
        const menuBtn = document.getElementById("menuBtn");
        const sideMenu = document.getElementById("sideMenu");
        const closeMenuBtn = document.getElementById("closeMenuBtn");
        const menuOverlay = document.getElementById("menuOverlay");
        if (menuBtn && sideMenu && closeMenuBtn) {
          const openMenu = (e) => { e.stopPropagation(); sideMenu.classList.add("open"); menuOverlay?.classList.add("visible"); };
          const closeMenu = () => { sideMenu.classList.remove("open"); menuOverlay?.classList.remove("visible"); };
          menuBtn.addEventListener("click", openMenu);
          menuBtn.addEventListener("touchstart", openMenu);
          closeMenuBtn.addEventListener("click", closeMenu);
          closeMenuBtn.addEventListener("touchstart", closeMenu);
          menuOverlay?.addEventListener("click", closeMenu);
        }
        // Logout from menu
        const sideLogoutBtn = document.getElementById("sideLogoutBtn");
        if (sideLogoutBtn) {
          sideLogoutBtn.onclick = function () {
            signOut(auth).then(() => {
              window.location.href = "login.html";
            });
          };
        }
      });
    </script>
    <script src="script.js?v=2"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("service-worker.js");
        });
      }
    </script>
  </body>
</html>
