<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00c853" />
    <link rel="manifest" href="manifest.json" />
    <title>FXcrypt - PnL Calculator for Forex and Crypto</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="top-nav-bar">
      <div class="menu-nav">
        <button
          id="menuBtn"
          class="menu-btn"
          title="Menu"
          aria-label="Open menu"
        >
          <span class="menu-icon">
            <span></span>
            <span></span>
            <span></span>
          </span>
        </button>
      </div>
      <div class="profile-nav">
        <a href="profile.html" class="profile-btn" title="View Profile">
          <span id="profileInitials"></span>
        </a>
      </div>
    </div>
    <div id="sideMenu" class="side-menu">
      <div class="side-menu-header">
        <span class="side-menu-title">Menu</span>
        <button
          id="closeMenuBtn"
          class="close-menu-btn"
          aria-label="Close menu"
        >
          &times;
        </button>
      </div>
      <ul class="side-menu-list">
        <li><a href="profile.html">My Profile</a></li>
        <li><a href="prices.html">Crypto Prices</a></li>
        <li>
          <button id="sideLogoutBtn" class="side-logout-btn">Logout</button>
        </li>
      </ul>
    </div>
    <!-- profile-nav moved into top-nav-bar above for horizontal alignment -->
    <div class="container">
      <img
        src="logo.svg"
        alt="FXcrypt Logo"
        style="display: block; margin: 0 auto 20px; width: 200px; height: auto"
      />
      <nav class="menu-tabs">
        <a href="index.html" class="tab active">PnL Calculator</a>
        <a href="prices.html" class="tab">Crypto Prices</a>
        <div
          style="
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 15px;
          "
        >
          <span id="userEmail" style="color: #aaa; font-size: 14px"></span>
          <button id="logoutBtn" class="logout-btn" style="display: none">
            Logout
          </button>
        </div>
      </nav>
      <form id="pnlForm">
        <label for="tradeType">Trade Type:</label>
        <select id="tradeType" style="margin-bottom: 16px;">
          <option value="crypto">Crypto</option>
          <option value="forex">Forex</option>
        </select>

        <div id="cryptoOptions" style="display: block" class="crypto-options">
          <div class="position-toggles" id="positionToggles">
            <div class="pos-btn long active" data-pos="long">Long</div>
            <div class="pos-btn short" data-pos="short">Short</div>
          </div>
          <input type="hidden" id="positionType" value="long" />
          <label for="leverage">Leverage:</label>
          <input type="number" id="leverage" step="any" value="20" min="1" />
        </div>

        <label for="entryPrice">Entry Price:</label>
        <input type="number" id="entryPrice" step="any" required />
        <label for="exitPrice">Exit Price:</label>
        <input type="number" id="exitPrice" step="any" required />
        <label for="quantity" id="quantityLabel">Quantity:</label>
        <input type="number" id="quantity" step="any" required />
        <label for="capital">Margin (Capital):</label>
        <input type="number" id="capital" step="any" required />
        <div id="forexOptions" style="display: none" class="forex-options">
          <div class="form-row">
            <label for="lotSize">Lot Size:</label>
            <input type="number" id="lotSize" step="any" value="1" />
          </div>
          <div class="form-row">
            <label for="contractSize">Contract Size:</label>
            <input type="number" id="contractSize" step="any" value="100000" />
          </div>
          <div class="form-row">
            <label for="exchangeRate">Exchange Rate:</label>
            <input type="number" id="exchangeRate" step="any" value="1" />
          </div>
          <div class="converter-section">
            <h3>Currency Converter</h3>
            <div class="form-row">
              <label for="fromCurrency">From:</label>
              <select id="fromCurrency">
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
                <option value="GBP">GBP</option>
                <option value="JPY">JPY</option>
                <option value="AUD">AUD</option>
                <option value="CAD">CAD</option>
                <option value="CHF">CHF</option>
                <option value="CNY">CNY</option>
                <option value="INR">INR</option>
              </select>
            </div>
            <div class="form-row">
              <label for="toCurrency">To:</label>
              <select id="toCurrency">
                <option value="EUR">EUR</option>
                <option value="USD">USD</option>
                <option value="GBP">GBP</option>
                <option value="JPY">JPY</option>
                <option value="AUD">AUD</option>
                <option value="CAD">CAD</option>
                <option value="CHF">CHF</option>
                <option value="CNY">CNY</option>
                <option value="INR">INR</option>
              </select>
            </div>
            <div class="form-row">
              <label for="convertAmount">Amount:</label>
              <input
                type="number"
                id="convertAmount"
                step="any"
                placeholder="Enter amount"
              />
            </div>
            <button type="button" id="convertBtn" class="convert-button">
              Convert
            </button>
            <div id="converterResult" class="converter-result"></div>
          </div>
        </div>
        <button type="submit">Calculate PnL</button>
      </form>
      <div id="result"></div>
    </div>
    <script type="module">
      import { setupAuthObserver } from './authObserver.js';
      import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
      import { auth } from './firebase.js';

      document.addEventListener("DOMContentLoaded", function () {
        // STEP 6: Auth State Observer
        setupAuthObserver((user) => {
          if (!user) {
            window.location.href = "login.html";
            return;
          }

          document.getElementById("userEmail").textContent = user.email;
          document.getElementById("logoutBtn").style.display = "block";

          let initials = user.email[0].toUpperCase();
          document.getElementById("profileInitials").textContent = initials;
        });

        document.getElementById("logoutBtn").addEventListener("click", function () {
          signOut(auth).then(() => {
            window.location.href = "login.html";
          });
        });

        // Menu open/close logic (responsive and touch-friendly)
        const menuBtn = document.getElementById("menuBtn");
        const sideMenu = document.getElementById("sideMenu");
        const closeMenuBtn = document.getElementById("closeMenuBtn");
        if (menuBtn && sideMenu && closeMenuBtn) {
          const openMenu = (e) => {
            e.stopPropagation();
            sideMenu.classList.add("open");
          };
          const closeMenu = (e) => {
            e.stopPropagation();
            sideMenu.classList.remove("open");
          };
          menuBtn.addEventListener("click", openMenu);
          menuBtn.addEventListener("touchstart", openMenu);
          closeMenuBtn.addEventListener("click", closeMenu);
          closeMenuBtn.addEventListener("touchstart", closeMenu);
          // Close menu on outside click (mouse or touch)
          document.addEventListener("mousedown", function (e) {
            if (
              sideMenu.classList.contains("open") &&
              !sideMenu.contains(e.target) &&
              e.target !== menuBtn
            ) {
              sideMenu.classList.remove("open");
            }
          });
          document.addEventListener("touchstart", function (e) {
            if (
              sideMenu.classList.contains("open") &&
              !sideMenu.contains(e.target) &&
              e.target !== menuBtn
            ) {
              sideMenu.classList.remove("open");
            }
          });
        }
        // Logout from menu
        const sideLogoutBtn = document.getElementById("sideLogoutBtn");
        if (sideLogoutBtn) {
          sideLogoutBtn.onclick = function () {
            signOut(auth).then(() => {
              window.location.href = "login.html";
            });
          };
        }
      });
    </script>
    <script src="script.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("service-worker.js");
        });
      }
    </script>
  </body>
</html>
