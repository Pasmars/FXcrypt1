<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00c853" />
    <link rel="manifest" href="manifest.json" />
    <title>User Profile - FXcrypt</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="profile-nav">
      <a href="index.html" title="Back to Dashboard">←</a>
    </div>

    <div class="profile-container">
      <div class="profile-header">
        <div class="profile-icon" id="profileIcon"></div>
        <h2 id="userFullName"></h2>
        <p id="userEmailDisplay"></p>
      </div>

      <div class="profile-details">
        <div class="detail-row">
          <span class="detail-label">Email:</span>
          <span class="detail-value" id="detailEmail"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">First Name:</span>
          <span class="detail-value" id="detailFirstName"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Last Name:</span>
          <span class="detail-value" id="detailLastName"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Phone:</span>
          <span class="detail-value" id="detailPhone"></span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Member Since:</span>
          <span class="detail-value" id="detailJoinDate"></span>
        </div>
      </div>

      <button class="back-btn" onclick="window.location.href = 'index.html'">
        Back to Dashboard
      </button>
    </div>

    <script type="module">
      import { setupAuthObserver } from './authObserver.js';
      import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
      import { db } from './firebase.js';

      // STEP 6: Auth State Observer
      setupAuthObserver(async (user) => {
        if (!user) {
          window.location.href = "login.html";
          return;
        }

        let joinDate = new Date(user.metadata.creationTime).toLocaleDateString();

        // Fetch additional details from Firestore
        let firstName = "N/A";
        let lastName = "N/A";
        let phone = "N/A";
        
        try {
          const docRef = doc(db, "users", user.uid);
          const docSnap = await getDoc(docRef);
          if (docSnap.exists()) {
            const data = docSnap.data();
            firstName = data.firstName || "N/A";
            lastName = data.lastName || "N/A";
            phone = data.phone || "N/A";
          } else if (user.displayName) {
            const parts = user.displayName.split(" ");
            firstName = parts[0] || "N/A";
            lastName = parts.slice(1).join(" ") || "N/A";
          }
        } catch (e) {
          console.error("Error fetching user details from Firestore:", e);
        }

        let initials = user.email[0].toUpperCase();
        if (firstName !== "N/A" || lastName !== "N/A") {
          initials = ((firstName !== "N/A" ? firstName[0] : "") + (lastName !== "N/A" ? lastName[0] : "")).toUpperCase();
        }

        document.getElementById("profileIcon").textContent = initials;

        // Fill in profile details
        let fullName = (firstName !== "N/A" && lastName !== "N/A") ? `${firstName} ${lastName}` : user.email;
        
        document.getElementById("userFullName").textContent = fullName;
        document.getElementById("userEmailDisplay").textContent = user.email;
        document.getElementById("detailEmail").textContent = user.email;
        document.getElementById("detailFirstName").textContent = firstName;
        document.getElementById("detailLastName").textContent = lastName;
        document.getElementById("detailPhone").textContent = phone;
        document.getElementById("detailJoinDate").textContent = joinDate;
      });
    </script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("service-worker.js");
        });
      }
    </script>
  </body>
</html>
